const speak=(text,rate=0.8)=>{window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=rate;u.pitch=1.1;window.speechSynthesis.speak(u)};
const playOK=()=>{try{const c=new(window.AudioContext||window.webkitAudioContext)();const t=(f,s,d)=>{const o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.value=f;g.gain.setValueAtTime(0.3,s);g.gain.exponentialRampToValueAtTime(0.01,s+d);o.connect(g);g.connect(c.destination);o.start(s);o.stop(s+d)};t(830,c.currentTime,0.15);t(1100,c.currentTime+0.15,0.25)}catch(e){}};
const playNG=()=>{try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();o.type="square";o.frequency.value=200;g.gain.setValueAtTime(0.15,c.currentTime);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.25);o.connect(g);g.connect(c.destination);o.start(c.currentTime);o.stop(c.currentTime+0.25)}catch(e){}};
const playChime=()=>{try{const c=new(window.AudioContext||window.webkitAudioContext)();const t=(f,s,d)=>{const o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.value=f;g.gain.setValueAtTime(0.2,s);g.gain.exponentialRampToValueAtTime(0.01,s+d);o.connect(g);g.connect(c.destination);o.start(s);o.stop(s+d)};t(523,c.currentTime,0.15);t(659,c.currentTime+0.12,0.15);t(784,c.currentTime+0.24,0.2)}catch(e){}};
const Confetti=({show})=>{if(!show)return null;const p=Array.from({length:40},(_,i)=>({id:i,left:Math.random()*100,delay:Math.random()*0.5,color:["#FF6B6B","#FFD43B","#69DB7C","#4DABF7","#DA77F2","#FF8E72"][i%6],size:6+Math.random()*8}));return(<div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999}}>{p.map(p=>(<div key={p.id} style={{position:"absolute",left:p.left+"%",top:"-10px",width:p.size,height:p.size,backgroundColor:p.color,borderRadius:Math.random()>0.5?"50%":"2px",animation:"confettiFall 1.8s "+p.delay+"s ease-in forwards"}}/>))}</div>)};

// ===== TABS =====
const TabNav=({activeTab,setActiveTab})=>{const tabs=[{id:"cards",label:"카드",icon:"🃏"},{id:"write",label:"따라쓰기",icon:"✏️"},{id:"match",label:"매칭",icon:"🎯"},{id:"typing",label:"타이핑",icon:"⌨️"},{id:"vocab",label:"단어",icon:"📚"},{id:"wordwrite",label:"단어쓰기",icon:"✍️"}];
return(<div className="tab-scroll" style={{display:"flex",gap:4,padding:"8px 8px",overflowX:"auto",WebkitOverflowScrolling:"touch",background:"rgba(255,255,255,0.7)",borderRadius:20,margin:"0 auto",backdropFilter:"blur(10px)",maxWidth:520,scrollbarWidth:"none"}}><style>{`.tab-scroll::-webkit-scrollbar{display:none}`}</style>{tabs.map(tab=>(<button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{flexShrink:0,padding:"8px 8px",border:"none",borderRadius:14,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"'Nunito',sans-serif",transition:"all 0.3s cubic-bezier(0.34,1.56,0.64,1)",minWidth:58,background:activeTab===tab.id?"#4DABF7":"transparent",color:activeTab===tab.id?"#fff":"#555",transform:activeTab===tab.id?"scale(1.05)":"scale(1)",boxShadow:activeTab===tab.id?"0 4px 15px rgba(77,171,247,0.4)":"none"}}><span style={{fontSize:16}}>{tab.icon}</span><br/><span style={{fontSize:10}}>{tab.label}</span></button>))}</div>)};

// ===== ALPHABET CARDS =====
const AlphabetCards=()=>{const[ci,setCi]=useState(0);const[showLower,setShowLower]=useState(false);const[flip,setFlip]=useState(false);const d=ALPHABET_DATA[ci];const color=PASTEL_COLORS[ci];const go=(dir)=>{setFlip(true);setTimeout(()=>{setCi(i=>(i+dir+26)%26);setShowLower(false);setFlip(false)},250)};
return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20}}><div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center",maxWidth:500,padding:"0 10px"}}>{ALPHABET_DATA.map((a,i)=>(<button key={a.letter} onClick={()=>{setCi(i);setShowLower(false)}} style={{width:32,height:32,border:"none",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:800,fontFamily:"'Nunito',sans-serif",background:i===ci?PASTEL_COLORS[i]:"rgba(255,255,255,0.6)",color:i===ci?"#fff":"#777",transition:"all 0.2s",transform:i===ci?"scale(1.15)":"scale(1)"}}>{a.letter}</button>))}</div>
<div onClick={()=>speak(d.letter.toLowerCase())} style={{width:280,minHeight:360,borderRadius:28,padding:30,cursor:"pointer",background:"linear-gradient(145deg,"+color+"22,"+color+"44)",border:"3px solid "+color+"66",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,transition:"all 0.3s",position:"relative",transform:flip?"scale(0.9) rotateY(90deg)":"scale(1) rotateY(0deg)",boxShadow:"0 8px 30px "+color+"33"}}><div style={{fontSize:80,lineHeight:1}}>{d.emoji}</div><div style={{fontSize:90,fontWeight:900,fontFamily:"'Fredoka','Nunito',sans-serif",color:color,textShadow:"2px 2px 0px "+color+"44",lineHeight:1}}>{showLower?d.letter.toLowerCase():d.letter}</div><div style={{fontSize:24,fontWeight:700,color:"#555",fontFamily:"'Nunito',sans-serif"}}>{d.word}</div><div style={{display:"flex",gap:8,marginTop:5}}><button onClick={e=>{e.stopPropagation();setShowLower(false)}} style={{padding:"6px 16px",border:"none",borderRadius:10,cursor:"pointer",fontSize:16,fontWeight:800,fontFamily:"'Fredoka',sans-serif",background:!showLower?color:"rgba(0,0,0,0.06)",color:!showLower?"#fff":"#999"}}>{d.letter}</button><button onClick={e=>{e.stopPropagation();setShowLower(true)}} style={{padding:"6px 16px",border:"none",borderRadius:10,cursor:"pointer",fontSize:16,fontWeight:800,fontFamily:"'Fredoka',sans-serif",background:showLower?color:"rgba(0,0,0,0.06)",color:showLower?"#fff":"#999"}}>{d.letter.toLowerCase()}</button></div><div style={{position:"absolute",top:12,right:16,fontSize:22,opacity:0.5}}>🔊</div></div>
<div style={{display:"flex",gap:16,alignItems:"center"}}><button onClick={()=>go(-1)} style={{width:48,height:48,border:"none",borderRadius:14,cursor:"pointer",fontSize:18,fontWeight:700,background:"rgba(255,255,255,0.8)",color:"#555",boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>◀</button><span style={{fontSize:14,color:"#999",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>{ci+1}/26</span><button onClick={()=>go(1)} style={{width:48,height:48,border:"none",borderRadius:14,cursor:"pointer",fontSize:18,fontWeight:700,background:"rgba(255,255,255,0.8)",color:"#555",boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>▶</button></div></div>)};

// ===== WRITING PRACTICE (scroll fixed) =====
const WritingPractice=()=>{const canvasRef=useRef(null);const[ci,setCi]=useState(0);const drawingRef=useRef(false);const[isLower,setIsLower]=useState(false);const d=ALPHABET_DATA[ci];const color=PASTEL_COLORS[ci];
const clearCanvas=useCallback(()=>{const c=canvasRef.current;if(!c)return;const ctx=c.getContext("2d");ctx.clearRect(0,0,c.width,c.height);ctx.font="bold 180px Fredoka,Nunito,sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle=color+"40";ctx.fillText(isLower?d.letter.toLowerCase():d.letter,c.width/2,c.height/2);ctx.strokeStyle="#ddd";ctx.lineWidth=1;ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(20,c.height*0.65);ctx.lineTo(c.width-20,c.height*0.65);ctx.stroke();ctx.setLineDash([])},[ci,isLower,color,d.letter]);
useEffect(()=>{clearCanvas()},[clearCanvas]);
useEffect(()=>{
  const c=canvasRef.current;if(!c)return;
  const getPos=e=>{const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy}};
  const onStart=e=>{e.preventDefault();e.stopPropagation();drawingRef.current=true;const ctx=c.getContext("2d"),p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.strokeStyle=color;ctx.lineWidth=6;ctx.lineCap="round";ctx.lineJoin="round"};
  const onMove=e=>{if(!drawingRef.current)return;e.preventDefault();e.stopPropagation();const ctx=c.getContext("2d"),p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke()};
  const onEnd=e=>{e.preventDefault();drawingRef.current=false};
  c.addEventListener("touchstart",onStart,{passive:false});c.addEventListener("touchmove",onMove,{passive:false});c.addEventListener("touchend",onEnd,{passive:false});
  c.addEventListener("mousedown",onStart);c.addEventListener("mousemove",onMove);c.addEventListener("mouseup",onEnd);c.addEventListener("mouseleave",onEnd);
  return()=>{c.removeEventListener("touchstart",onStart);c.removeEventListener("touchmove",onMove);c.removeEventListener("touchend",onEnd);c.removeEventListener("mousedown",onStart);c.removeEventListener("mousemove",onMove);c.removeEventListener("mouseup",onEnd);c.removeEventListener("mouseleave",onEnd)};
},[color]);
return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}><div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>{ALPHABET_DATA.map((a,i)=>(<button key={a.letter} onClick={()=>setCi(i)} style={{width:30,height:30,border:"none",borderRadius:7,cursor:"pointer",fontSize:12,fontWeight:800,fontFamily:"'Nunito',sans-serif",background:i===ci?PASTEL_COLORS[i]:"rgba(255,255,255,0.5)",color:i===ci?"#fff":"#888"}}>{a.letter}</button>))}</div>

// ===== MATCHING GAME (Listen & Pick Emoji) =====
const MATCH_POOL=[{en:"Dog",emoji:"🐶",ko:"강아지"},{en:"Cat",emoji:"🐱",ko:"고양이"},{en:"Bear",emoji:"🐻",ko:"곰"},{en:"Lion",emoji:"🦁",ko:"사자"},{en:"Fish",emoji:"🐟",ko:"물고기"},{en:"Frog",emoji:"🐸",ko:"개구리"},{en:"Pig",emoji:"🐷",ko:"돼지"},{en:"Duck",emoji:"🦆",ko:"오리"},{en:"Bird",emoji:"🐦",ko:"새"},{en:"Fox",emoji:"🦊",ko:"여우"},{en:"Star",emoji:"⭐",ko:"별"},{en:"Sun",emoji:"☀️",ko:"태양"},{en:"Moon",emoji:"🌙",ko:"달"},{en:"Tree",emoji:"🌳",ko:"나무"},{en:"Apple",emoji:"🍎",ko:"사과"},{en:"Cake",emoji:"🎂",ko:"케이크"},{en:"Bus",emoji:"🚌",ko:"버스"},{en:"Car",emoji:"🚗",ko:"자동차"},{en:"Hat",emoji:"🎩",ko:"모자"},{en:"Cup",emoji:"🥤",ko:"컵"},{en:"Milk",emoji:"🥛",ko:"우유"},{en:"Egg",emoji:"🥚",ko:"달걀"},{en:"Pizza",emoji:"🍕",ko:"피자"},{en:"Banana",emoji:"🍌",ko:"바나나"},{en:"Flower",emoji:"🌸",ko:"꽃"},{en:"Rain",emoji:"🌧️",ko:"비"},{en:"Snow",emoji:"❄️",ko:"눈"},{en:"House",emoji:"🏠",ko:"집"},{en:"Penguin",emoji:"🐧",ko:"펭귄"},{en:"Rabbit",emoji:"🐰",ko:"토끼"}];
const MatchingGame=()=>{
  const[answer,setAnswer]=useState(null);
  const[choices,setChoices]=useState([]);
  const[feedback,setFeedback]=useState(null);
  const[score,setScore]=useState(0);
  const[total,setTotal]=useState(0);
  const[streak,setStreak]=useState(0);
  const[showConfetti,setShowConfetti]=useState(false);
  const[shakeIdx,setShakeIdx]=useState(-1);
  const[numChoices,setNumChoices]=useState(4);
  const[showAnswer,setShowAnswer]=useState(false);

  const generate=useCallback(()=>{
    const aIdx=Math.floor(Math.random()*MATCH_POOL.length);
    const ans=MATCH_POOL[aIdx];
    setAnswer(ans);
    const wrong=MATCH_POOL.filter((_,i)=>i!==aIdx).sort(()=>Math.random()-0.5).slice(0,numChoices-1);
    setChoices([ans,...wrong].sort(()=>Math.random()-0.5));
    setFeedback(null);setShakeIdx(-1);setShowAnswer(false);
    setTimeout(()=>speak(ans.en,0.7),400);
  },[numChoices]);

  useEffect(()=>{generate()},[]);
  useEffect(()=>{generate();setScore(0);setTotal(0);setStreak(0)},[numChoices]);

  const handlePick=(item,idx)=>{
    if(feedback)return;
    setTotal(t=>t+1);
    if(item.en===answer.en){
      setScore(s=>s+1);const ns=streak+1;setStreak(ns);
      setFeedback("correct");playOK();setShowAnswer(true);
      speak(answer.en,0.7);
      if(ns>0&&ns%5===0){setShowConfetti(true);setTimeout(()=>setShowConfetti(false),2000)}
      setTimeout(()=>generate(),1200);
    }else{
      setStreak(0);setFeedback("wrong");playNG();
      setShakeIdx(idx);setTimeout(()=>setShakeIdx(-1),500);
      setTimeout(()=>setFeedback(null),800);
    }
  };

  const replay=()=>{if(answer)speak(answer.en,0.7)};

  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:18}}>
    <Confetti show={showConfetti}/>
    <div style={{display:"flex",gap:14,alignItems:"center"}}>
      <div style={{display:"flex",gap:8,alignItems:"center",background:"rgba(255,255,255,0.6)",padding:"8px 16px",borderRadius:14}}><span style={{fontSize:22}}>⭐</span><span style={{fontSize:18,fontWeight:800,color:"#FFD43B",fontFamily:"'Fredoka',sans-serif"}}>{score}/{total}</span></div>
      {streak>=2&&<div style={{display:"flex",gap:4,alignItems:"center",background:"#FF6B6B22",padding:"8px 14px",borderRadius:14,animation:"popIn 0.3s ease-out"}}><span style={{fontSize:18}}>🔥</span><span style={{fontSize:16,fontWeight:800,color:"#FF6B6B",fontFamily:"'Fredoka',sans-serif"}}>{streak}연속!</span></div>}
    </div>
    <div style={{fontSize:15,fontWeight:700,color:"#666",fontFamily:"'Nunito',sans-serif",textAlign:"center"}}>소리를 듣고 맞는 그림을 골라요!</div>
    {/* Difficulty */}
    <div style={{display:"flex",gap:6}}>
      {[{n:3,label:"쉬움"},{n:4,label:"보통"},{n:6,label:"어려움"}].map(d=>(<button key={d.n} onClick={()=>setNumChoices(d.n)} style={{padding:"6px 14px",border:"none",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:800,fontFamily:"'Nunito',sans-serif",background:numChoices===d.n?"#4DABF7":"rgba(0,0,0,0.06)",color:numChoices===d.n?"#fff":"#888",transition:"all 0.2s"}}>{d.label}</button>))}
    </div>
    {/* Speaker */}
    <button onClick={replay} style={{width:100,height:100,borderRadius:"50%",border:"none",cursor:"pointer",fontSize:44,background:"linear-gradient(145deg,#4FC3F7,#29B6F6)",color:"#fff",boxShadow:"0 6px 25px rgba(79,195,247,0.4)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",animation:"pulse 2s ease-in-out infinite"}}>🔊</button>
    <div style={{fontSize:12,color:"#aaa",fontFamily:"'Nunito',sans-serif",marginTop:-10}}>눌러서 다시 듣기</div>
    {/* Show answer after correct */}
    {showAnswer&&answer&&(<div style={{animation:"bounceIn 0.4s ease-out",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <span style={{fontSize:60}}>{answer.emoji}</span>
      <span style={{fontSize:28,fontWeight:900,fontFamily:"'Fredoka',sans-serif",color:"#4DABF7"}}>{answer.en}</span>
      <span style={{fontSize:14,color:"#888",fontFamily:"'Nunito',sans-serif"}}>{answer.ko}</span>
    </div>)}
    {/* Choice grid */}
    {!showAnswer&&(<div style={{display:"grid",gridTemplateColumns:numChoices<=4?"repeat(2,1fr)":"repeat(3,1fr)",gap:12,width:"100%",maxWidth:340}}>
      {choices.map((item,i)=>{
        const isShaking=shakeIdx===i;
        return(<button key={item.en+"-"+i} onClick={()=>handlePick(item,i)} style={{
          padding:"20px 8px",border:"none",borderRadius:20,cursor:feedback?"default":"pointer",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,
          background:"rgba(255,255,255,0.85)",
          boxShadow:"0 4px 15px rgba(0,0,0,0.06)",transition:"all 0.2s",
          animation:isShaking?"shake 0.4s ease-out":"popIn 0.3s "+(i*0.06)+"s ease-out both",
          border:"3px solid transparent",
        }}>
          <span style={{fontSize:numChoices<=4?48:36}}>{item.emoji}</span>
        </button>);
      })}
    </div>)}
    {/* Feedback */}
    <div style={{height:32,display:"flex",alignItems:"center"}}>
      {feedback==="correct"&&!showAnswer&&<div style={{fontSize:20,fontWeight:800,color:"#2B8A3E",fontFamily:"'Fredoka',sans-serif",animation:"popIn 0.3s ease-out"}}>🎉 정답!</div>}
      {feedback==="wrong"&&<div style={{fontSize:20,fontWeight:800,color:"#C92A2A",fontFamily:"'Fredoka',sans-serif",animation:"popIn 0.3s ease-out"}}>😊 다시 들어봐요!</div>}
    </div>
    <button onClick={()=>{setScore(0);setTotal(0);setStreak(0);generate()}} style={{padding:"8px 20px",border:"none",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'Nunito',sans-serif",background:"rgba(0,0,0,0.06)",color:"#888"}}>🔄 초기화</button>
  </div>);
};

// ===== TYPING QUIZ =====
const TypingQuiz=()=>{const[ci,setCi]=useState(()=>Math.floor(Math.random()*26));const[score,setScore]=useState(0);const[total,setTotal]=useState(0);const[feedback,setFeedback]=useState(null);const[showConfetti,setShowConfetti]=useState(false);const[streak,setStreak]=useState(0);const[shakeAnim,setShakeAnim]=useState(false);const[popAnim,setPopAnim]=useState(false);const d=ALPHABET_DATA[ci];const color=PASTEL_COLORS[ci];const inputRef=useRef(null);
const nextLetter=useCallback(()=>{let n;do{n=Math.floor(Math.random()*26)}while(n===ci);setCi(n);setFeedback(null);setPopAnim(true);setTimeout(()=>setPopAnim(false),300)},[ci]);

<div style={{height:40,display:"flex",alignItems:"center"}}>{feedback==="correct"&&<div style={{fontSize:20,fontWeight:800,color:"#2B8A3E",fontFamily:"'Fredoka',sans-serif",animation:"popIn 0.3s ease-out"}}>🎉 정답!</div>}{feedback==="wrong"&&<div style={{fontSize:20,fontWeight:800,color:"#C92A2A",fontFamily:"'Fredoka',sans-serif",animation:"popIn 0.3s ease-out"}}>😊 다시!</div>}{!feedback&&<div style={{fontSize:28,animation:"float 2s ease-in-out infinite"}}>⌨️</div>}</div>

  const[itemIdx,setItemIdx]=useState(0);
  const[showKo,setShowKo]=useState(false);

  if(!catId){
    return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20}}>

    <div onClick={()=>speak(item.en,0.7)} style={{width:280,minHeight:340,borderRadius:28,padding:30,cursor:"pointer",background:"linear-gradient(145deg,"+cat.color+"15,"+cat.color+"33)",border:"3px solid "+cat.color+"44",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,transition:"all 0.3s",position:"relative",transform:flipAnim?"scale(0.9) rotateY(90deg)":"scale(1) rotateY(0deg)",boxShadow:"0 8px 30px "+cat.color+"22"}}>

  </div>);

// ===== WORD WRITING (scroll fixed) =====
const WordWriting=()=>{const canvasRef=useRef(null);const[wi,setWi]=useState(0);const drawingRef=useRef(false);const d=WRITE_WORDS[wi];
const clearCanvas=useCallback(()=>{const c=canvasRef.current;if(!c)return;const ctx=c.getContext("2d");ctx.clearRect(0,0,c.width,c.height);ctx.font="bold 80px Fredoka,Nunito,sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="rgba(77,171,247,0.15)";ctx.fillText(d.word,c.width/2,c.height/2);ctx.strokeStyle="#ddd";ctx.lineWidth=1;ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(20,c.height*0.68);ctx.lineTo(c.width-20,c.height*0.68);ctx.stroke();ctx.setLineDash([])},[wi,d.word]);
useEffect(()=>{clearCanvas()},[clearCanvas]);
useEffect(()=>{
  const c=canvasRef.current;if(!c)return;
  const getPos=e=>{const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy}};
  const onStart=e=>{e.preventDefault();e.stopPropagation();drawingRef.current=true;const ctx=c.getContext("2d"),p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.strokeStyle="#4DABF7";ctx.lineWidth=5;ctx.lineCap="round";ctx.lineJoin="round"};
  const onMove=e=>{if(!drawingRef.current)return;e.preventDefault();e.stopPropagation();const ctx=c.getContext("2d"),p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke()};
  const onEnd=e=>{e.preventDefault();drawingRef.current=false};
  c.addEventListener("touchstart",onStart,{passive:false});c.addEventListener("touchmove",onMove,{passive:false});c.addEventListener("touchend",onEnd,{passive:false});
  c.addEventListener("mousedown",onStart);c.addEventListener("mousemove",onMove);c.addEventListener("mouseup",onEnd);c.addEventListener("mouseleave",onEnd);
  return()=>{c.removeEventListener("touchstart",onStart);c.removeEventListener("touchmove",onMove);c.removeEventListener("touchend",onEnd);c.removeEventListener("mousedown",onStart);c.removeEventListener("mousemove",onMove);c.removeEventListener("mouseup",onEnd);c.removeEventListener("mouseleave",onEnd)};
},[]);
const next=()=>{setWi(i=>(i+1)%WRITE_WORDS.length)};const prev2=()=>{setWi(i=>(i-1+WRITE_WORDS.length)%WRITE_WORDS.length)};
return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}><div style={{fontSize:14,fontWeight:700,color:"#666",fontFamily:"'Nunito',sans-serif",textAlign:"center"}}>단어를 따라 써보세요!</div>
<div style={{display:"flex",gap:12,alignItems:"center"}}><span style={{fontSize:50}}>{d.emoji}</span><span style={{fontSize:40,fontWeight:900,fontFamily:"'Fredoka',sans-serif",color:"#4DABF7"}}>{d.word}</span><button onClick={()=>speak(d.word,0.7)} style={{background:"none",border:"none",fontSize:28,cursor:"pointer"}}>🔊</button></div>
<div style={{display:"flex",gap:6,justifyContent:"center"}}>{d.word.split("").map((ch,idx)=>(<div key={idx} onClick={()=>speak(ch)} style={{width:44,height:52,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(77,171,247,0.1)",border:"2px solid rgba(77,171,247,0.3)",cursor:"pointer",fontSize:24,fontWeight:900,fontFamily:"'Fredoka',sans-serif",color:"#4DABF7",transition:"all 0.2s",animation:"slideRight 0.3s "+idx*0.08+"s ease-out both"}}>{ch}</div>))}</div>
<div style={{position:"relative",borderRadius:20,overflow:"hidden",boxShadow:"0 4px 20px rgba(0,0,0,0.08)",background:"#fff",border:"3px solid rgba(77,171,247,0.3)"}}><canvas ref={canvasRef} width={360} height={200} style={{width:360,height:200,touchAction:"none",cursor:"crosshair",display:"block"}}/></div>
<div style={{display:"flex",gap:10}}><button onClick={clearCanvas} style={{padding:"10px 24px",border:"none",borderRadius:12,cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"'Nunito',sans-serif",background:"#FF6B6B",color:"#fff"}}>🗑️ 지우기</button><button onClick={()=>{speak("Well done!");playChime();clearCanvas();next()}} style={{padding:"10px 24px",border:"none",borderRadius:12,cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"'Nunito',sans-serif",background:"#69DB7C",color:"#fff"}}>✅ 다음</button></div>
<div style={{display:"flex",gap:16,alignItems:"center"}}><button onClick={prev2} style={{width:44,height:44,border:"none",borderRadius:12,cursor:"pointer",fontSize:16,background:"rgba(255,255,255,0.8)",color:"#555",boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>◀</button><span style={{fontSize:13,color:"#999",fontFamily:"'Nunito',sans-serif",fontWeight:700}}>{wi+1}/{WRITE_WORDS.length}</span><button onClick={()=>{clearCanvas();next()}} style={{width:44,height:44,border:"none",borderRadius:12,cursor:"pointer",fontSize:16,background:"rgba(255,255,255,0.8)",color:"#555",boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>▶</button></div></div>)};

// ===== APP =====
function App(){const[activeTab,setActiveTab]=useState("cards");
return(<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#FFF5F5 0%,#FFF9DB 25%,#EBFBEE 50%,#E7F5FF 75%,#F3F0FF 100%)",padding:"20px 16px 40px",fontFamily:"'Nunito',sans-serif"}}>
<div style={{textAlign:"center",marginBottom:16}}><h1 style={{fontSize:28,fontWeight:900,fontFamily:"'Fredoka',sans-serif",background:"linear-gradient(135deg,#FF6B6B,#FFD43B,#69DB7C,#4DABF7,#9775FA)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:0,lineHeight:1.3}}>🌈 ABC 알파벳 놀이</h1><p style={{fontSize:12,color:"#999",margin:"4px 0 0",fontWeight:600}}>재미있게 영어를 배워요!</p></div>
<TabNav activeTab={activeTab} setActiveTab={setActiveTab}/>
<div style={{marginTop:20}}>{activeTab==="cards"&&<AlphabetCards/>}{activeTab==="write"&&<WritingPractice/>}{activeTab==="match"&&<MatchingGame/>}{activeTab==="typing"&&<TypingQuiz/>}{activeTab==="vocab"&&<VocabSection/>}{activeTab==="wordwrite"&&<WordWriting/>}</div></div>)}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
